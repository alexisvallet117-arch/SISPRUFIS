<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Principal - Sistema de Evaluación</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2b6f8a;
            --primary-dark: #1f4f63;
            --text-dark: #1e293b;
            --bg-overlay: rgba(248, 250, 252, 0.85);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Fondo */
            background-image: url("fondomenu.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .contenedor {
            width: 100%;
            max-width: 420px;
            background: var(--bg-overlay);
            backdrop-filter: blur(5px); /* Efecto de desenfoque moderno */
            padding: 40px 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 {
            color: var(--text-dark);
            font-size: 1.4rem;
            margin-bottom: 5px;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h3 {
            color: var(--primary);
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 30px;
            background: #e2e8f0;
            padding: 8px;
            border-radius: 8px;
            display: inline-block;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        button:active {
            transform: translateY(0);
        }

        .salir {
            background: #64748b;
            margin-top: 10px;
        }

        .salir:hover {
            background: #475569;
        }

        /* Iconos decorativos */
        button::before {
            font-size: 1.2rem;
        }

        .btn-t::before { content: "🏃‍♂️"; }
        .btn-a::before { content: "🏊‍♂️"; }
        .btn-r::before { content: "📊"; }
        .btn-s::before { content: "🚪"; }

    </style>

    <script src="script.js"></script>
    <script>
        window.onload = function() {
            let evaluador = sessionStorage.getItem("evaluador") || "No identificado";
            document.getElementById("evaluador").innerHTML = "Evaluador: " + evaluador;
        }

        function cerrarSesionLocal() {
            if(confirm("¿Seguro que desea salir?")) {
                // Si tienes una función en script.js úsala, si no, usa esta:
                sessionStorage.clear();
                window.location.href = 'index.html';
            }
        }
    </script>
</head>

<body>

    <div class="contenedor">
        <h2>Sistema de Evaluación de Pruebas Físicas</h2>
        <h3 id="evaluador">Cargando...</h3>

        <div class="menu-grid">
            <button class="btn-t" onclick="window.location='terrestre.html'">
                Evaluar pruebas terrestres
            </button>

            <button class="btn-a" onclick="window.location='acuatico.html'">
                Evaluar pruebas acuáticas
            </button>

            <button class="btn-r" onclick="window.location='resultados.html'">
                Ver evaluados
            </button>

            <button class="salir btn-s" onclick="cerrarSesionLocal()">
                Cerrar sesión
            </button>
        </div>
    </div>

</body>

</html>
