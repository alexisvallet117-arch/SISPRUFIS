<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Menú</title>

<style>

body{

font-family:Arial;

/* fondo */
background-image:url("fondomenu.png");

background-size:cover;

background-position:center;

background-attachment:fixed;

}

.contenedor{

width:400px;
margin:auto;
margin-top:80px;
background:white;
padding:25px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px gray;

}

button{

width:100%;
padding:15px;
margin:10px;
font-size:16px;
background:#2b6f8a;
color:white;
border:none;
cursor:pointer;

}

button:hover{
background:#1f4f63;
}

.salir{

background:#6c757d;

}

.salir:hover{

background:#5a6268;

}

h3{

color:#2b6f8a;

}

</style>

<script src="script.js"></script>

<script>

window.onload=function(){

let evaluador=sessionStorage.getItem("evaluador");

document.getElementById("evaluador").innerHTML=
"Evaluador: "+evaluador;

}

</script>

</head>

<body>

<div class="contenedor">

<h2>SISTEMA DE EVALUACIÓN DE PRUEBAS FÍSICAS</h2>

<h3 id="evaluador"></h3>

<button onclick="window.location='terrestre.html'">
Evaluar pruebas terrestres
</button>

<button onclick="window.location='acuatico.html'">
Evaluar pruebas acuáticas
</button>

<button onclick="window.location='resultados.html'">
Ver evaluados
</button>

<button class="salir" onclick="cerrarSesion()">
Cerrar sesión
</button>

</div>

</body>

</html>
