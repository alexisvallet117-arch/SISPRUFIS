<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Pruebas Acuáticas</title>

<script src="script.js"></script>

<style>

body{

font-family:Arial;

/* fondo */
background-image:url("fondonat.png");

background-size:cover;

background-position:center;

background-attachment:fixed;

}

.contenedor{

width:420px;
margin:auto;
margin-top:40px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;

}

h2{

text-align:center;
color:#2b6f8a;

}

label{

font-weight:bold;

}

input{

width:100%;
padding:8px;
margin:6px 0 15px 0;

}

button{

width:100%;
padding:12px;
margin-top:5px;
background:#2b6f8a;
color:white;
border:none;
cursor:pointer;
font-size:15px;

}

button:hover{

background:#1f4f63;

}

.salir{

background:#6c757d;

}

.salir:hover{

background:#5a6268;

}

</style>

<script>

function guardarAcuatico(){

let evaluador=sessionStorage.getItem("evaluador");

let datos={

Tipo:"Acuatico",

Evaluador:evaluador,

Nombre:document.getElementById("nombre").value,

"2400m":"",

Sentadillas:"",

Lagartijas:"",

Plancha:"",

Barras:"",

Apnea:document.getElementById("apnea").value,

Nado:document.getElementById("nado").value,

Flotacion:document.getElementById("flotacion").value,

Fecha:new Date().toLocaleDateString()

};

guardarRegistro(datos);

document.getElementById("form").reset();

}

</script>

</head>

<body>

<div class="contenedor">

<h2>PRUEBAS ACUÁTICAS</h2>

<form id="form">

<label>Nombre del evaluado</label>
<input type="text" id="nombre" required>

<label>Apnea 30 m (min:seg)</label>
<input type="text" id="apnea" placeholder="00:40">

<label>Nado 200 m (min:seg)</label>
<input type="text" id="nado" placeholder="03:30">

<label>Flotación 10 min (min:seg)</label>
<input type="text" id="flotacion" placeholder="10:00">

</form>

<button onclick="guardarAcuatico()">
Guardar resultados
</button>

<br>

<button onclick="window.location='menu.html'">
Regresar al menú
</button>

<button class="salir" onclick="cerrarSesion()">
Cerrar sesión
</button>

</div>

</body>

</html>
