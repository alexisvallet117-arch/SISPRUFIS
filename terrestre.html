<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Pruebas Terrestres</title>
<script src="script.js"></script>
<style>

body{

font-family:Arial;
background:#f0f0f0;

}

.contenedor{

width:420px;
margin:auto;
margin-top:40px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;

}

h2{

text-align:center;
color:#2b6f8a;

}

label{

font-weight:bold;

}

input{

width:100%;
padding:8px;
margin:6px 0 15px 0;

}

button{

width:100%;
padding:12px;
margin-top:5px;
background:#2b6f8a;
color:white;
border:none;
cursor:pointer;
font-size:15px;

}

button:hover{

background:#1f4f63;

}

.salir{

background:#6c757d;

}

.salir:hover{

background:#5a6268;

}

</style>

<script>

function guardarTerrestre(){

let evaluador=sessionStorage.getItem("evaluador");

let datos={

Tipo:"Terrestre",

Evaluador:evaluador,

Nombre:document.getElementById("nombre").value,

"2400m":document.getElementById("carrera").value,

Sentadillas:document.getElementById("sentadillas").value,

Lagartijas:document.getElementById("lagartijas").value,

Plancha:document.getElementById("plancha").value,

Barras:document.getElementById("barras").value,

Apnea:"",

Nado:"",

Flotacion:"",

Fecha:new Date().toLocaleDateString()

};

guardarRegistro(datos);

document.getElementById("form").reset();

}

</script>

</head>

<body>

<div class="contenedor">

<h2>PRUEBAS TERRESTRES</h2>

<form id="form">

<label>Nombre evaluado</label>
<input type="text" id="nombre" required>

<label>Carrera 2400 m (min:seg)</label>
<input type="text" id="carrera" placeholder="10:30">

<label>Sentadillas (reps)</label>
<input type="number" id="sentadillas">

<label>Lagartijas (reps)</label>
<input type="number" id="lagartijas">

<label>Plancha (min:seg)</label>
<input type="text" id="plancha" placeholder="03:00">

<label>Barras (reps)</label>
<input type="number" id="barras">

</form>

<button onclick="guardarTerrestre()">
Guardar resultados
</button>

<br>

<button onclick="window.location='menu.html'">
Regresar al menú
</button>

<button class="salir" onclick="cerrarSesion()">
Cerrar sesión
</button>

</div>

</body>

</html>
