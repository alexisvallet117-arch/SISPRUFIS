<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Pruebas Terrestres</title>

<script src="script.js"></script>

<style>

body{
font-family:Arial;
background-image:url("fondoter.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.contenedor{
width:420px;
margin:auto;
margin-top:40px;
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:10px;
box-shadow:0 0 15px black;
}

h2{
text-align:center;
color:#2b6f8a;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:8px;
margin:6px 0 15px 0;
}

button{
width:100%;
padding:12px;
margin-top:5px;
background:#2b6f8a;
color:white;
border:none;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#1f4f63;
}

.salir{
background:#6c757d;
}

.salir:hover{
background:#5a6268;
}

</style>

<script>

function guardarTerrestre(){

let evaluador = sessionStorage.getItem("evaluador");

// 🔥 VALIDACIÓN IMPORTANTE
let nombre = document.getElementById("nombre").value;
let sexo = document.getElementById("sexo").value;
let edad = document.getElementById("edad").value;

if(nombre === "" || sexo === "" || edad === ""){
alert("Por favor completa los campos obligatorios");
return;
}

let datos = {

Tipo:"Terrestre",
Evaluador:evaluador,
Nombre:nombre,
Sexo:sexo,
Edad:edad,

"2400m":document.getElementById("carrera").value,
Sentadillas:document.getElementById("sentadillas").value,
Lagartijas:document.getElementById("lagartijas").value,
Plancha:document.getElementById("plancha").value,
Barras:document.getElementById("barras").value,

Apnea:"",
Nado:"",
Flotacion:"",

Fecha:new Date().toLocaleString()

};

// 🔥 GUARDADO LOCAL (respaldo)
let registros = JSON.parse(localStorage.getItem("resultados")) || [];
registros.push(datos);
localStorage.setItem("resultados", JSON.stringify(registros));

// 🔥 GUARDAR EN GOOGLE SHEETS
guardarEnNube(datos);

alert("Resultados guardados correctamente");

document.getElementById("form").reset();

}

</script>

</head>

<body>

<div class="contenedor">

<h2>PRUEBAS TERRESTRES</h2>

<form id="form">

<label>Nombre evaluado</label>
<input type="text" id="nombre" required>

<label>Sexo</label>
<select id="sexo" required>
<option value="">Seleccionar</option>
<option value="Hombre">Hombre</option>
<option value="Mujer">Mujer</option>
</select>

<label>Rango de edad</label>
<select id="edad" required>
<option value="">Seleccionar</option>
<option value="18-29">18-29 años</option>
<option value="30-39">30-39 años</option>
<option value="40-49">40-49 años</option>
</select>

<label>Carrera 2400 m (min:seg)</label>
<input type="text" id="carrera" placeholder="10:30">

<label>Sentadillas (reps)</label>
<input type="number" id="sentadillas">

<label>Lagartijas (reps)</label>
<input type="number" id="lagartijas">

<label>Plancha (min:seg)</label>
<input type="text" id="plancha" placeholder="03:00">

<label>Barras (reps)</label>
<input type="number" id="barras">

</form>

<button onclick="guardarTerrestre()">
Guardar resultados
</button>

<br>

<button onclick="window.location='menu.html'">
Regresar al menú
</button>

<button class="salir" onclick="cerrarSesion()">
Cerrar sesión
</button>

</div>

</body>

</html>
