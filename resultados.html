<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de Evaluaciones</title>
    
    <!-- Librerías Externas -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2b6f8a;
            --primary-dark: #1f4f63;
            --bg: #f8fafc;
            --text: #334155;
            --border: #e2e8f0;
            --m-color: #0ea5e9;
            --f-color: #ec4899;
            --terrestre-bg: #fffbeb;
            --acuatico-bg: #eff6ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 25px;
        }

        .contenedor {
            max-width: 1400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Corrección de alineación y scroll */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto; /* Permite que las columnas se ajusten al contenido */
            min-width: 1200px;
        }

        th {
            background-color: var(--primary);
            color: white;
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 15px 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            text-align: center;
            vertical-align: middle;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        /* Indicadores laterales de sexo */
        .fila-hombre { border-left: 6px solid var(--m-color); }
        .fila-mujer { border-left: 6px solid var(--f-color); }

        /* Colores de celdas por tipo de prueba */
        .terrestre { background-color: var(--terrestre-bg); color: #854d0e; font-weight: 500; }
        .acuatico { background-color: var(--acuatico-bg); color: #1e40af; font-weight: 500; }

        /* Botonera */
        .acciones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: var(--primary-dark); }

        .btn-secundario { background: #e2e8f0; color: #475569; }
        .btn-secundario:hover { background: #cbd5e1; }

        .btn-danger { background: #fee2e2; color: #b91c1c; }
        .btn-danger:hover { background: #fecaca; }

    </style>
</head>
<body>

    <h2>Resultados de Evaluaciones</h2>

    <div class="contenedor">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <!-- 13 Encabezados exactos para evitar el desfase -->
                        <th>Evaluador</th>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>2400m</th>
                        <th>Sentadillas</th>
                        <th>Lagartijas</th>
                        <th>Plancha</th>
                        <th>Barras</th>
                        <th>Apnea</th>
                        <th>Nado</th>
                        <th>Flotación</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="datos">
                    <!-- Los datos se inyectan aquí -->
                </tbody>
            </table>
        </div>

        <div class="acciones">
            <button class="btn-main" onclick="exportarExcel()">📊 Descargar Excel</button>
            <button class="btn-secundario" onclick="window.location='menu.html'">⬅ Volver al Menú</button>
            <button class="btn-danger" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNI0iBkoi9_GbbqS25R8bidVpUUMa8aR2mYB_gL0zMB4zscpmFcr6RhaIn7TkGBJqoPeteIKPm8GZB/pub?gid=0&single=true&output=csv";

        window.onload = function() {
            fetch(URL_CSV)
                .then(res => res.text())
                .then(csv => {
                    let filas = csv.split("\n").map(f => f.split(","));
                    let tablaHtml = "";

                    if (!filas || filas.length <= 1) {
                        document.getElementById("datos").innerHTML = "<tr><td colspan='13'>Sin registros encontrados</td></tr>";
                        return;
                    }

                    for (let i = 1; i < filas.length; i++) {
                        let fila = filas[i];
                        if (!fila || fila.length < 10) continue;

                        // Asignación de variables por índice
                        let evaluador   = fila[0] || "";
                        let nombre      = fila[1] || "";
                        let tipo        = fila[2] || "";
                        let sexo        = (fila[3] || "").trim().toLowerCase();
                        let carrera     = fila[4] || "";
                        let sentadillas = fila[5] || "";
                        let lagartijas  = fila[6] || "";
                        let plancha     = fila[7] || "";
                        let barras      = fila[8] || "";
                        let apnea       = fila[9] || "";
                        let nado        = fila[10] || "";
                        let flotacion   = fila[11] || "";
                        let fechaRaw    = fila[12] || "";

                        // 1. Limpieza de Fecha (quita comillas y saltos de línea detectados en la imagen)
                        let fechaLimpia = fechaRaw.replace(/[Entropy"']/g, '').replace(/\r?\n|\r/g, " ").trim();

                        // 2. Clase de fila según sexo
                        let claseSexo = (sexo === "hombre") ? "fila-hombre" : "fila-mujer";

                        // 3. Construcción de la fila con 13 celdas exactas
                        tablaHtml += `
                        <tr class="${claseSexo}">
                            <td style="font-weight:600">${evaluador}</td>
                            <td>${nombre}</td>
                            <td>${tipo}</td>
                            <td style="text-transform: capitalize;">${sexo}</td>
                            <td class="terrestre">${carrera}</td>
                            <td class="terrestre">${sentadillas}</td>
                            <td class="terrestre">${lagartijas}</td>
                            <td class="terrestre">${plancha}</td>
                            <td class="terrestre">${barras}</td>
                            <td class="acuatico">${apnea}</td>
                            <td class="acuatico">${nado}</td>
                            <td class="acuatico">${flotacion}</td>
                            <td style="white-space: normal; font-size: 11px; color: #64748b;">${fechaLimpia}</td>
                        </tr>`;
                    }
                    document.getElementById("datos").innerHTML = tablaHtml;
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.getElementById("datos").innerHTML = "<tr><td colspan='13'>Error al cargar los datos</td></tr>";
                });
        }

        function exportarExcel() {
            const table = document.querySelector("table");
            const wb = XLSX.utils.table_to_book(table, { sheet: "Resultados" });
            XLSX.writeFile(wb, "Reporte_Evaluaciones.xlsx");
        }

        function cerrarSesion() {
            if(confirm("¿Desea cerrar la sesión?")) {
                window.location.href = "index.html"; 
            }
        }
    </script>
</body>
</html>
