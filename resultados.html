<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de Evaluaciones - Sistema Táctico</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1e293b;
            --primary-light: #334155;
            --accent: #16a34a;
            --accent-dark: #15803d;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --m-color: #38bdf8;
            --f-color: #f472b6;
            --terrestre-bg: rgba(245, 158, 11, 0.1);
            --terrestre-txt: #fbbf24;
            --acuatico-bg: rgba(14, 165, 233, 0.1);
            --acuatico-txt: #38bdf8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 30px 20px;
        }

        h2 {
            text-align: center;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .subtitulo {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .resumen-global {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto 25px auto;
        }

        .tarjeta-stat {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .tarjeta-stat p {
            margin: 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .tarjeta-stat .valor {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 5px;
            color: #ffffff;
        }

        .contenedor {
            max-width: 1400px;
            margin: auto;
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #111827;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
            min-width: 1300px;
        }

        th {
            background-color: #1f2937;
            color: #ffffff;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 16px 12px;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.88rem;
            text-align: center;
            vertical-align: middle;
            color: #e5e7eb;
        }

        tr:hover {
            background-color: rgba(55, 65, 81, 0.5);
        }

        .fila-hombre { border-left: 5px solid var(--m-color); }
        .fila-mujer { border-left: 5px solid var(--f-color); }

        .terrestre { background-color: var(--terrestre-bg); color: var(--terrestre-txt); font-weight: 600; }
        .acuatico { background-color: var(--acuatico-bg); color: var(--acuatico-txt); font-weight: 600; }
        
        .puntaje-final {
            font-weight: 700;
            font-size: 0.95rem;
            background-color: rgba(22, 163, 74, 0.15);
            color: #4ade80;
        }

        .acciones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        button {
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-main { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2); }
        .btn-main:hover { background: var(--accent-dark); transform: translateY(-1px); }

        .btn-secundario { background: #374151; color: #f3f4f6; border: 1px solid rgba(255,255,255,0.05); }
        .btn-secundario:hover { background: #4b5563; }

        .btn-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }
        
        .btn-debug { background: #5b21b6; color: #f5f3ff; margin-top: 15px; width: 100%; }
    </style>
</head>
<body>

    <h2>Resultados de Evaluaciones</h2>
    <div class="subtitulo">Módulo de Rendimiento y Rendición de Cuentas Físicas</div>

    <div class="resumen-global">
        <div class="tarjeta-stat">
            <p>Total Evaluados</p>
            <div class="valor" id="stat-total">0</div>
        </div>
        <div class="tarjeta-stat">
            <p>Promedio Eficiencia General</p>
            <div class="valor" id="stat-promedio" style="color: #4ade80;">0.0%</div>
        </div>
    </div>

    <div class="contenedor">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Evaluador</th>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Sexo</th>
                        <th>2400m</th>
                        <th>Sentadillas</th>
                        <th>Lagartijas</th>
                        <th>Plancha</th>
                        <th>Barras</th>
                        <th>Apnea</th>
                        <th>Nado</th>
                        <th>Flotación</th>
                        <th>Puntaje Eficiencia</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="datos">
                    <tr><td colspan="14">Conectando con la base de datos en línea...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="acciones">
            <button class="btn-main" onclick="exportarExcel()">📊 Descargar Reporte Excel</button>
            <button class="btn-secundario" onclick="window.location='menu.html'">⬅ Volver al Menú</button>
            <button class="btn-danger" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
        
        <button class="btn-debug" onclick="ejecutarDiagnostico()">⚙️ Ejecutar Diagnóstico de Datos</button>
    </div>

    <script>
        const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNI0iBkoi9_GbbqS25R8bidVpUUMa8aR2mYB_gL0zMB4zscpmFcr6RhaIn7TkGBJqoPeteIKPm8GZB/pub?gid=0&single=true&output=csv";
        
        let textoCsvCrudo = ""; // Almacenará la respuesta para diagnóstico rápido

        const RANGOS_MAXIMOS = {
            sentadillas: 60,
            lagartijas: 50,
            plancha: 180, 
            barras: 15,
            apnea: 60,    
            nado: 100,    
            flotacion: 15 
        };

        function calcularPuntajeFila(carrera, sentadillas, lagartijas, plancha, barras, apnea, nado, flotacion) {
            let puntosSumados = 0;
            let metricasEvaluadas = 0;

            if (carrera && carrera.toString().trim() !== "" && carrera !== "0" && carrera !== "-") {
                let partes = carrera.toString().split(":");
                let segundosTotales = 0;
                if(partes.length === 2) {
                    segundosTotales = (parseInt(partes[0], 10) * 60) + parseInt(partes[1], 10);
                } else {
                    segundosTotales = parseFloat(carrera) * 60;
                }
                
                if (segundosTotales > 0) {
                    let pctCarrera = ((1020 - segundosTotales) / (1020 - 600)) * 100;
                    puntosSumados += Math.max(0, Math.min(100, pctCarrera));
                    metricasEvaluadas++;
                }
            }

            const evaluarMetricaDirecta = (valor, maximo) => {
                let num = parseFloat(valor);
                if (valor && !isNaN(num) && num > 0) {
                    let pct = (num / maximo) * 100;
                    puntosSumados += Math.max(0, Math.min(100, pct));
                    metricasEvaluadas++;
                }
            };

            evaluarMetricaDirecta(sentadillas, RANGOS_MAXIMOS.sentadillas);
            evaluarMetricaDirecta(lagartijas, RANGOS_MAXIMOS.lagartijas);
            evaluarMetricaDirecta(plancha, RANGOS_MAXIMOS.plancha);
            evaluarMetricaDirecta(barras, RANGOS_MAXIMOS.barras);
            evaluarMetricaDirecta(apnea, RANGOS_MAXIMOS.apnea);
            evaluarMetricaDirecta(nado, RANGOS_MAXIMOS.nado);
            evaluarMetricaDirecta(flotacion, RANGOS_MAXIMOS.flotacion);

            if (metricasEvaluadas === 0) return 0;
            return (puntosSumados / metricasEvaluadas);
        }

        window.onload = function() {
            fetch(URL_CSV)
                .then(res => {
                    if(!res.ok) throw new Error("HTTP status " + res.status);
                    return res.text();
                })
                .then(csv => {
                    textoCsvCrudo = csv;
                    let lineas = csv.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                    
                    if (lineas.length <= 1) {
                        document.getElementById("datos").innerHTML = "<tr><td colspan='14'>El archivo de la base de datos se encuentra vacío.</td></tr>";
                        return;
                    }

                    // Determinar dinámicamente si usa coma o punto y coma
                    let separador = lineas[0].includes(";") ? ";" : ",";
                    
                    // Obtener nombres de las columnas en minúsculas para mapeo inteligente
                    let encabezadosExcel = lineas[0].split(separador).map(h => h.replace(/^"|"$/g, '').trim().toLowerCase());

                    // Mapear los índices reales basados en el nombre de la columna en tu Excel en línea
                    let idx = {
                        evaluador: encabezadosExcel.findIndex(h => h.includes("evaluador")),
                        nombre: encabezadosExcel.findIndex(h => h.includes("nombre")),
                        tipo: encabezadosExcel.findIndex(h => h.includes("tipo")),
                        sexo: encabezadosExcel.findIndex(h => h.includes("sexo")),
                        carrera: encabezadosExcel.findIndex(h => h.includes("2400m") || h.includes("carrera")),
                        sentadillas: encabezadosExcel.findIndex(h => h.includes("sentadillas")),
                        lagartijas: encabezadosExcel.findIndex(h => h.includes("lagartijas")),
                        plancha: encabezadosExcel.findIndex(h => h.includes("plancha")),
                        barras: encabezadosExcel.findIndex(h => h.includes("barras")),
                        apnea: encabezadosExcel.findIndex(h => h.includes("apnea")),
                        nado: encabezadosExcel.findIndex(h => h.includes("nado")),
                        flotacion: encabezadosExcel.findIndex(h => h.includes("flotacion")),
                        fecha: encabezadosExcel.findIndex(h => h.includes("fecha"))
                    };

                    // Si falló la búsqueda inteligente por nombres, recurrir a los índices por posición fija antiguos
                    if(idx.evaluador === -1) {
                        idx = { evaluador: 0, nombre: 1, tipo: 2, sexo: 3, carrera: 4, sentadillas: 5, lagartijas: 6, plancha: 7, barras: 8, apnea: 9, nado: 10, flotacion: 11, fecha: 12 };
                    }

                    let tablaHtml = "";
                    let sumaPuntajesGlobales = 0;
                    let contadorRegistrosValidos = 0;

                    for (let i = 1; i < lineas.length; i++) {
                        let fila = lineas[i].split(separador).map(celda => celda.replace(/^"|"$/g, '').trim());
                        
                        // Validar que la fila tenga contenido mínimo
                        if (fila.length < 3) continue;

                        let evaluador   = fila[idx.evaluador] || "-";
                        let nombre      = fila[idx.nombre] || "-";
                        let tipo        = fila[idx.tipo] || "-";
                        let sexo        = (fila[idx.sexo] || "").toLowerCase();
                        let carrera     = fila[idx.carrera] || "-";
                        let sentadillas = fila[idx.sentadillas] || "-";
                        let lagartijas  = fila[idx.lagartijas] || "-";
                        let plancha     = fila[idx.plancha] || "-";
                        let barras      = fila[idx.barras] || "-";
                        let apnea       = fila[idx.apnea] || "-";
                        let nado        = fila[idx.nado] || "-";
                        let flotacion   = fila[idx.flotacion] || "-";
                        let sampleFecha = fila[idx.fecha] || "-";

                        let resultadoEficiencia = calcularPuntajeFila(carrera, sentadillas, lagartijas, plancha, barras, apnea, nado, flotacion);
                        
                        if(resultadoEficiencia > 0) {
                            sumaPuntajesGlobales += resultadoEficiencia;
                            contadorRegistrosValidos++;
                        }

                        let claseSexo = (sexo.includes("hombre") || sexo === "m" || sexo === "h") ? "fila-hombre" : "fila-mujer";

                        tablaHtml += `
                        <tr class="${claseSexo}">
                            <td style="font-weight:600; color: #ffffff;">${evaluador}</td>
                            <td style="text-align: left; font-weight:500;">${nombre}</td>
                            <td>${tipo}</td>
                            <td style="text-transform: capitalize; font-weight: 500;">${sexo || "-"}</td>
                            <td class="terrestre">${carrera}</td>
                            <td class="terrestre">${sentadillas}</td>
                            <td class="terrestre">${lagartijas}</td>
                            <td class="terrestre">${plancha}</td>
                            <td class="terrestre">${barras}</td>
                            <td class="acuatico">${apnea}</td>
                            <td class="acuatico">${nado}</td>
                            <td class="acuatico">${flotacion}</td>
                            <td class="puntaje-final">${resultadoEficiencia.toFixed(1)}%</td>
                            <td style="white-space: nowrap; font-size: 11px; color: var(--text-muted);">${sampleFecha}</td>
                        </tr>`;
                    }
                    
                    if(tablaHtml === "") {
                        document.getElementById("datos").innerHTML = "<tr><td colspan='14'>Estructura procesada sin datos visibles. Verifique el orden en Excel.</td></tr>";
                        return;
                    }

                    document.getElementById("datos").innerHTML = tablaHtml;

                    // Actualizar marcadores numéricos superiores
                    document.getElementById("stat-total").innerText = contadorRegistrosValidos;
                    if(contadorRegistrosValidos > 0) {
                        let promFinal = (sumaPuntajesGlobales / contadorRegistrosValidos).toFixed(1);
                        document.getElementById("stat-promedio").innerText = promFinal + "%";
                    }

                })
                .catch(err => {
                    console.error("Error crítico:", err);
                    document.getElementById("datos").innerHTML = `<tr><td colspan='14' style='color:#f87171;'>Fallo de enlace remoto: ${err.message}. Asegúrese de volver a Publicar en la Web en formato CSV.</td></tr>`;
                });
        }

        function ejecutarDiagnostico() {
            if(!textoCsvCrudo) {
                alert("🔴 Diagnóstico: El sistema no ha recibido ninguna respuesta de Google Sheets. Tu enlace está roto, privado, o bloqueado por políticas de red (CORS).");
                return;
            }
            let lineas = textoCsvCrudo.split("\n");
            let msg = `✨ DIAGNÓSTICO DEL SISTEMA TÁCTICO ✨\n\n`;
            msg += `• Total Líneas detectadas: ${lineas.length}\n`;
            msg += `• Separador asumido: ${textoCsvCrudo.includes(";") ? "Punto y coma (;)" : "Coma (,)"}\n\n`;
            msg += `• Encabezado real leído:\n"${lineas[0]}"\n\n`;
            msg += `• Ejemplo Fila 1:\n"${lineas[1] || 'No existe fila 1'}"\n\n`;
            msg += `Si el encabezado o la fila se ven vacíos, re-publica tu hoja de cálculo desde Google Drive.`;
            alert(msg);
        }

        function exportarExcel() {
            const table = document.querySelector("table");
            const wb = XLSX.utils.table_to_book(table, { sheet: "Resultados Finales" });
            XLSX.writeFile(wb, "Reporte_Eficiencia_Pruebas_Fisicas.xlsx");
        }

        function cerrarSesion() {
            if(confirm("¿Desea cerrar la sesión del sistema?")) {
                window.location.href = "index.html"; 
            }
        }
    </script>
</body>
</html>
