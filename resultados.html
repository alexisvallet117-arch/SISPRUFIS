<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Resultados</title>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f0f0f0;
}

h2{
text-align:center;
margin-top:20px;
}

.contenedor{
width:95%;
margin:auto;
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid gray;
padding:8px;
text-align:center;
}

th{
background:#2b6f8a;
color:white;
}

/* 🟤 Pruebas terrestres */
.terrestre{
background:#ecd9c6;
}

/* 🌊 Pruebas acuáticas */
.acuatico{
background:#d4e6f1;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#2b6f8a;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1f4f63;
}

.salir{
background:#6c757d;
}

.salir:hover{
background:#5a6268;
}

</style>

<script>

const URL_API = "https://script.google.com/macros/s/AKfycbxGMbwP2pc1jhS6zM3hSP49a6M7WtHi2jqf0GvhYXb-L9x-VXnQnDSp6jmKCJFyDl_a/exec";

window.onload = function(){

fetch(URL_API, {
  method: "GET",
  headers: {
    "Accept": "application/json"
  }
})
.then(res => res.text())
.then(text => {

let registros;

try{
  registros = JSON.parse(text);
}catch(e){
  alert("Error al leer datos");
  console.log(text);
  return;
}

console.log("DATOS:", registros);

let tabla = "";

// validar si hay datos
if(!registros || registros.length <= 1){
document.getElementById("datos").innerHTML = "<tr><td colspan='12'>Sin registros</td></tr>";
return;
}

// recorrer datos
for(let i=1;i<registros.length;i++){

let fila = registros[i];

if(!fila || fila.length === 0) continue;

let evaluador = fila[0] || "";
let nombre = fila[1] || "";
let tipo = fila[2] || "";
let carrera = fila[3] || "";
let sentadillas = fila[4] || "";
let lagartijas = fila[5] || "";
let plancha = fila[6] || "";
let barras = fila[7] || "";
let apnea = fila[8] || "";
let nado = fila[9] || "";
let flotacion = fila[10] || "";
let fecha = fila[11] || "";

tabla += `<tr>

<td>${evaluador}</td>
<td>${nombre}</td>
<td>${tipo}</td>

<td class="terrestre">${carrera}</td>
<td class="terrestre">${sentadillas}</td>
<td class="terrestre">${lagartijas}</td>
<td class="terrestre">${plancha}</td>
<td class="terrestre">${barras}</td>

<td class="acuatico">${apnea}</td>
<td class="acuatico">${nado}</td>
<td class="acuatico">${flotacion}</td>

<td>${fecha}</td>

</tr>`;

}

document.getElementById("datos").innerHTML = tabla;

})
.catch(err => {
alert("Error al cargar datos");
console.log(err);
});

}


// 🔥 EXPORTAR EXCEL
function exportarExcel(){

fetch(URL_API, {
  method: "GET",
  headers: {
    "Accept": "application/json"
  }
})
.then(res => res.text())
.then(text => {

let data = JSON.parse(text);

if(!data || data.length <= 1){
alert("No hay registros");
return;
}

let hoja = XLSX.utils.aoa_to_sheet(data);
let libro = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(libro, hoja, "Resultados");

XLSX.writeFile(libro,"resultados_pruebas_fisicas.xlsx");

})
.catch(err => {
alert("Error al exportar");
console.log(err);
});

}

</script>
</head>

<body>

<h2>RESULTADOS DE EVALUACIONES</h2>

<div class="contenedor">

<table>

<tr>
<th>Evaluador</th>
<th>Nombre</th>
<th>Tipo</th>
<th>2400m</th>
<th>Sentadillas</th>
<th>Lagartijas</th>
<th>Plancha</th>
<th>Barras</th>
<th>Apnea</th>
<th>Nado</th>
<th>Flotación</th>
<th>Fecha</th>
</tr>

<tbody id="datos"></tbody>

</table>

<button onclick="exportarExcel()">
Descargar Excel
</button>

<button onclick="window.location='menu.html'">
Regresar al menú
</button>

<button class="salir" onclick="cerrarSesion()">
Cerrar sesión
</button>

</div>

</body>

</html>
