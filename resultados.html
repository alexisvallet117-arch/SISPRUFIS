<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Resultados</title>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f0f0f0;
}

h2{
text-align:center;
margin-top:20px;
}

.contenedor{
width:95%;
margin:auto;
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid gray;
padding:8px;
text-align:center;
}

th{
background:#2b6f8a;
color:white;
}

/* 🔵 Hombre */
.hombre{
background:#d6eaf8;
}

/* 🌸 Mujer */
.mujer{
background:#f9d6e5;
}

/* 🟤 Pruebas terrestres */
.terrestre{
background:#ecd9c6;
}

/* 🌊 Pruebas acuáticas */
.acuatico{
background:#d4e6f1;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#2b6f8a;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1f4f63;
}

.salir{
background:#6c757d;
}

.salir:hover{
background:#5a6268;
}

</style>

<script>

const URL_API = "PEGA_AQUI_TU_URL_DE_GOOGLE_APPS_SCRIPT";

window.onload = function(){

fetch(URL_API)
.then(res => res.json())
.then(registros => {

let tabla = "";

// 🔥 empezamos desde 1 para saltar encabezados
for(let i=1;i<registros.length;i++){

let fila = registros[i];

// columnas según tu orden
let evaluador = fila[0] || "";
let nombre = fila[1] || "";
let tipo = (fila[2] || "").toLowerCase();
let carrera = fila[3] || "";
let sentadillas = fila[4] || "";
let lagartijas = fila[5] || "";
let plancha = fila[6] || "";
let barras = fila[7] || "";
let apnea = fila[8] || "";
let nado = fila[9] || "";
let flotacion = fila[10] || "";
let fecha = fila[11] || "";

// 🔵🌸 COLOR POR SEXO
// ⚠️ AQUÍ USAMOS "nombre" DE SEXO SI LO AGREGAS DESPUÉS
let claseFila = "";

if(tipo === "hombre"){
claseFila = "hombre";
}
if(tipo === "mujer"){
claseFila = "mujer";
}

tabla += "<tr class='"+claseFila+"'>" +

"<td>"+evaluador+"</td>" +
"<td>"+nombre+"</td>" +
"<td>"+tipo+"</td>" +

// 🟤 TERRESTRES
"<td class='terrestre'>"+carrera+"</td>" +
"<td class='terrestre'>"+sentadillas+"</td>" +
"<td class='terrestre'>"+lagartijas+"</td>" +
"<td class='terrestre'>"+plancha+"</td>" +
"<td class='terrestre'>"+barras+"</td>" +

// 🌊 ACUÁTICAS
"<td class='acuatico'>"+apnea+"</td>" +
"<td class='acuatico'>"+nado+"</td>" +
"<td class='acuatico'>"+flotacion+"</td>" +

"<td>"+fecha+"</td>" +

"</tr>";

}

document.getElementById("datos").innerHTML = tabla;

})
.catch(err => {
alert("Error al cargar datos");
console.log(err);
});

}


// 🔥 EXPORTAR (ahora desde nube)
function exportarExcel(){

fetch(URL_API)
.then(res => res.json())
.then(data => {

if(data.length <= 1){
alert("No hay registros");
return;
}

// quitar encabezados
let datos = data.slice(1);

let hoja = XLSX.utils.aoa_to_sheet(data);

let libro = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(libro, hoja, "Resultados");

XLSX.writeFile(libro,"resultados_pruebas_fisicas.xlsx");

});

}

</script>
</head>

<body>

<h2>RESULTADOS DE EVALUACIONES</h2>

<div class="contenedor">

<table>

<tr>
<th>Evaluador</th>
<th>Nombre</th>
<th>Tipo</th>
<th>2400m</th>
<th>Sentadillas</th>
<th>Lagartijas</th>
<th>Plancha</th>
<th>Barras</th>
<th>Apnea</th>
<th>Nado</th>
<th>Flotación</th>
<th>Fecha</th>
</tr>

<tbody id="datos"></tbody>

</table>

<button onclick="exportarExcel()">
Descargar Excel
</button>

<button onclick="window.location='menu.html'">
Regresar al menú
</button>

<button class="salir" onclick="cerrarSesion()">
Cerrar sesión
</button>

</div>

</body>

</html>
