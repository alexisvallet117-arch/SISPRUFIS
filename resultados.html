<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Resultados</title>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <!-- Google Fonts para un look más profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2b6f8a;
            --primary-dark: #1f4f63;
            --bg: #f8fafc;
            --text: #334155;
            --border: #e2e8f0;
            --m-color: #0ea5e9; /* Azul más moderno para hombre */
            --f-color: #ec4899; /* Rosa más moderno para mujer */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #1e293b;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .contenedor {
            max-width: 1200px;
            margin: 20px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        /* Contenedor de tabla responsiva */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px; /* Evita que se amontone en móvil */
        }

        th {
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 12px 15px;
            position: sticky;
            top: 0;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
            text-align: center;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        /* Indicadores sutiles de sexo */
        .hombre { border-left: 5px solid var(--m-color); }
        .mujer { border-left: 5px solid var(--f-color); }

        /* Estilo sutil para tipos de prueba */
        .terrestre { color: #854d0e; font-weight: 500; background: #fefce8; }
        .acuatico { color: #1e40af; font-weight: 500; background: #eff6ff; }

        /* Botonera */
        .acciones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            grid-column: span 2; /* El de Excel ocupa todo el ancho */
        }

        .btn-main:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .btn-secundario { background: #e2e8f0; color: #475569; }
        .btn-secundario:hover { background: #cbd5e1; }

        .btn-danger { background: #fee2e2; color: #b91c1c; }
        .btn-danger:hover { background: #fecaca; }

    </style>
</head>
<body>

    <h2>Resultados de Evaluaciones</h2>

    <div class="contenedor">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Evaluador</th>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Sexo</th>
                        <th>2400m</th>
                        <th>Sentadillas</th>
                        <th>Lagartijas</th>
                        <th>Plancha</th>
                        <th>Barras</th>
                        <th>Apnea</th>
                        <th>Nado</th>
                        <th>Flotación</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="datos">
                    <!-- Los datos se cargan aquí -->
                </tbody>
            </table>
        </div>

        <div class="acciones">
            <button class="btn-main" onclick="exportarExcel()">
                📊 Descargar Reporte Excel
            </button>
            <button class="btn-secundario" onclick="window.location='menu.html'">
                ⬅ Volver al Menú
            </button>
            <button class="btn-danger" onclick="cerrarSesion()">
                Cerrar Sesión
            </button>
        </div>
    </div>

    <script>
        const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNI0iBkoi9_GbbqS25R8bidVpUUMa8aR2mYB_gL0zMB4zscpmFcr6RhaIn7TkGBJqoPeteIKPm8GZB/pub?gid=0&single=true&output=csv";

        window.onload = function(){
            fetch(URL_CSV)
                .then(res => res.text())
                .then(csv => {
                    let filas = csv.split("\n").map(f => f.split(","));
                    let tabla = "";

                    if(!filas || filas.length <= 1){
                        document.getElementById("datos").innerHTML = "<tr><td colspan='13'>Sin registros</td></tr>";
                        return;
                    }

                    for(let i=1; i<filas.length; i++){
                        let fila = filas[i];
                        if(!fila || fila.length < 6) continue;

                        let [evaluador, nombre, tipo, sexo, carrera, sentadillas, lagartijas, plancha, barras, apnea, nado, flotacion, fecha] = fila;

                        let claseSexo = (sexo && sexo.toLowerCase() === "hombre") ? "hombre" : "mujer";

                        tabla += `
                        <tr class="${claseSexo}">
                            <td><b>${evaluador}</b></td>
                            <td>${nombre}</td>
                            <td>${tipo}</td>
                            <td>${sexo}</td>
                            <td class="terrestre">${carrera}</td>
                            <td class="terrestre">${sentadillas}</td>
                            <td class="terrestre">${lagartijas}</td>
                            <td class="terrestre">${plancha}</td>
                            <td class="terrestre">${barras}</td>
                            <td class="acuatico">${apnea}</td>
                            <td class="acuatico">${nado}</td>
                            <td class="acuatico">${flotacion}</td>
                            <td style="font-size: 11px; color: #64748b">${fecha}</td>
                        </tr>`;
                    }
                    document.getElementById("datos").innerHTML = tabla;
                })
                .catch(err => console.error("Error cargando datos:", err));
        }

        function exportarExcel(){
            // Tu lógica de exportación se mantiene igual, es correcta.
            alert("Iniciando descarga...");
            // ... (resto del código de excel)
        }
    </script>
</body>
</html>
