<!DOCTYPE html>
<html lang="es">

<head>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">

<title>Resultados</title>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
background:#f0f0f1;
}

h2{
text-align:center;
margin-top:20px;
}

.contenedor{
width:95%;
margin:auto;
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid gray;
padding:8px;
text-align:center;
}

th{
background:#2b6f8a;
color:white;
}

/* 🔵 Hombre */
.hombre{
background:#d6eaf8;
}

/* 🌸 Mujer */
.mujer{
background:#f9d6e5;
}

/* 🟤 Pruebas terrestres */
.terrestre{
background:#ecd9c6;
}

/* 🌊 Pruebas acuáticas */
.acuatico{
background:#d4e6f1;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#2b6f8a;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1f4f63;
}

.salir{
background:#6c757d;
}

.salir:hover{
background:#5a6268;
}

</style>

<script>

// 🔥 LINK CSV
const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNI0iBkoi9_GbbqS25R8bidVpUUMa8aR2mYB_gL0zMB4zscpmFcr6RhaIn7TkGBJqoPeteIKPm8GZB/pub?gid=0&single=true&output=csv";

window.onload = function(){

fetch(URL_CSV)
.then(res => res.text())
.then(csv => {

let filas = csv.split("\n").map(f => f.split(","));

let tabla = "";

if(!filas || filas.length <= 1){
document.getElementById("datos").innerHTML = "<tr><td colspan='13'>Sin registros</td></tr>";
return;
}

for(let i=1;i<filas.length;i++){

let fila = filas[i];
if(!fila || fila.length < 6) continue;

// 🔥 NUEVOS INDICES
let evaluador = fila[0] || "";
let nombre = fila[1] || "";
let tipo = fila[2] || "";
let sexo = fila[3] || ""; // 🔥 NUEVO

let carrera = fila[4] || "";
let sentadillas = fila[5] || "";
let lagartijas = fila[6] || "";
let plancha = fila[7] || "";
let barras = fila[8] || "";
let apnea = fila[9] || "";
let nado = fila[10] || "";
let flotacion = fila[11] || "";
let fecha = fila[12] || "";

// 🔥 COLOR POR SEXO
let claseFila = "";
if(sexo === "hombre") claseFila = "hombre";
if(sexo === "mujer") claseFila = "mujer";

tabla += `<tr class="${claseFila}">

<td>${evaluador}</td>
<td>${nombre}</td>
<td>${tipo}</td>
<td>${sexo}</td>

<td class="terrestre">${carrera}</td>
<td class="terrestre">${sentadillas}</td>
<td class="terrestre">${lagartijas}</td>
<td class="terrestre">${plancha}</td>
<td class="terrestre">${barras}</td>

<td class="acuatico">${apnea}</td>
<td class="acuatico">${nado}</td>
<td class="acuatico">${flotacion}</td>

<td>${fecha}</td>

</tr>`;

}

document.getElementById("datos").innerHTML = tabla;

})
.catch(err => {
alert("Error al cargar datos");
console.log(err);
});

}


// 🔥 EXPORTAR
function exportarExcel(){

fetch(URL_CSV)
.then(res => res.text())
.then(csv => {

let filas = csv.split("\n").map(f => f.split(","));

if(!filas || filas.length <= 1){
alert("No hay registros");
return;
}

let hoja = XLSX.utils.aoa_to_sheet(filas);
let libro = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(libro, hoja, "Resultados");

XLSX.writeFile(libro,"resultados_pruebas_fisicas.xlsx");

})
.catch(err => {
alert("Error al exportar");
console.log(err);
});

}

</script>

</head>

<body>

<h2>RESULTADOS DE EVALUACIONES</h2>

<div class="contenedor">

<table>

<tr>
<th>Evaluador</th>
<th>Nombre</th>
<th>Tipo</th>
<th>Sexo</th>
<th>2400m</th>
<th>Sentadillas</th>
<th>Lagartijas</th>
<th>Plancha</th>
<th>Barras</th>
<th>Apnea</th>
<th>Nado</th>
<th>Flotación</th>
<th>Fecha</th>
</tr>

<tbody id="datos"></tbody>

</table>

<button onclick="exportarExcel()">
Descargar Excel
</button>

<button onclick="window.location='menu.html'">
Regresar al menú
</button>

<button class="salir" onclick="cerrarSesion()">
Cerrar sesión
</button>

</div>

</body>

</html>
