<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Sistema de Pruebas Físicas</title>
    <style>
        /* Reseteo y caja inteligente */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.8)), url("fondoindex.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Contenedor principal estilo "Glassmorphism" institucional */
        .tarjeta-login {
            width: 100%;
            max-width: 400px;
            background-color: rgba(20, 32, 48, 0.85); /* Azul/Gris oscuro con transparencia */
            backdrop-filter: blur(10px); /* Desenfoque de fondo moderno */
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Cabecera */
        .cabecera {
            text-align: center;
            margin-bottom: 30px;
        }

        .cabecera h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            line-height: 1.4;
        }
        
        .cabecera p {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        /* Cuerpo del formulario y corrección de contenedor */
        .cuerpo-formulario {
            display: flex;
            flex-direction: column;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .grupo-input {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Etiquetas */
        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Inputs modernos e institucionales */
        input {
            width: 100%;
            padding: 12px 16px;
            font-size: 0.95rem;
            color: #ffffff;
            background-color: rgba(15, 23, 42, 0.6);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: #4ade80; /* Verde éxito/militar al enfocar */
            background-color: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.15);
        }

        input::placeholder {
            color: #64748b;
        }

        /* Botón Principal (Verde Táctico / Éxito) */
        .btn-entrar {
            width: 100%;
            padding: 14px;
            background-color: #16a34a; /* Verde militar/institucional sólido */
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2);
        }

        .btn-entrar:hover {
            background-color: #15803d;
            transform: translateY(-1px);
        }
        
        .btn-entrar:active {
            transform: translateY(0);
        }

        /* Separador visual elegante */
        .separador {
            text-align: center;
            margin: 25px 0;
            color: #64748b;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }
        
        .separador::before, .separador::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .separador::before { left: 0; }
        .separador::after { right: 0; }

        /* Botón de acceso directo secundario (Limpio y no competitivo) */
        .btn-acceso-directo {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: #f59e0b; /* Ámbar/Amarillo técnico suave */
            border: 1.5px solid rgba(245, 158, 11, 0.4);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-acceso-directo:hover {
            background-color: rgba(245, 158, 11, 0.08);
            border-color: #f59e0b;
        }
    </style>

    <script>
        // Tu lógica de JS exacta se mantiene intacta
        const usuarios = [
            {usuario:"admin", pass:"SeguridadAM"},
            {usuario:"Kraneo", pass:"FES123*"},
            {usuario:"Tenoch", pass:"FES321*"}
        ];

        function validarLogin(event) {
            event.preventDefault(); 

            const usuarioIngresado = document.getElementById("usuario").value.trim();
            const passIngresado = document.getElementById("pass").value;
            let acceso = false;

            for (let i = 0; i < usuarios.length; i++) {
                if (
                    usuarios[i].usuario === usuarioIngresado &&
                    usuarios[i].pass === passIngresado
                ) {
                    acceso = true;
                    break;
                }
            }

            if (acceso) {
                sessionStorage.setItem("evaluador", usuarioIngresado);
                window.location.href = "menu.html";
            } else {
                alert("Usuario o contraseña incorrectos. Por favor, intente de nuevo.");
            }
        }

        function accesoDirectoCalculadora() {
            window.location.href = "calculadora.html";
        }
    </script>
</head>
<body>

<div class="tarjeta-login">
    <div class="cabecera">
        <h2>Control de Acceso</h2>
        <p>Sistema de Pruebas Físicas</p>
    </div>

    <div class="cuerpo-formulario">
        <form onsubmit="validarLogin(event)">
            <div class="grupo-input">
                <label for="usuario">Evaluador</label>
                <input type="text" id="usuario" placeholder="Ingrese su usuario" required autocomplete="username">
            </div>

            <div class="grupo-input">
                <label for="pass">Contraseña</label>
                <input type="password" id="pass" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-entrar">
                Entrar al Sistema
            </button>
        </form>

        <div class="separador">O</div>

        <button onclick="accesoDirectoCalculadora()" class="btn-acceso-directo">
            Calculadora de Puntaje
        </button>
    </div>
</div>

</body>
</html>
